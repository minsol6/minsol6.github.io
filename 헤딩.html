<!DOCTYPE html>
<html long="ko">
<head>
    <meta charset="utf-8">
    <title>예제 3-5 헤딩(heading) 태그</title>
</head>
</body>
    <!--가장 중요한 제목: 가장 크고 굵게 표시됨-->
    <h1>h1: 가장 중요한 제목(가장 큰 글씨, 한 문단 구분)</h1>

    <!--두 번째 레벨 제목: h1보다는 작지만 여전히 강조된 제목-->
    <h2>h2: 두 번째 레벨 제목(다소 작은 글씨, 한 줄 띄고 표시)</h2>

    <!--세 번쨰 레벨 제목: 중간 정도 크기의 제목-->
    <h3>h3: 세 번째 레벨 제목(보통 크기의 제목)

    <!--네 번쨰 레벨 제목: h3보다 작아짐-->
    <h4>h4:네 번째 레벨 제목(조금 작은 크기의 제목)</h4>

    <!--다섯 번쨰 레벨 제목: 본문 텍스트와 비슷한 크기이나 여전히 구별됨-->
    <h5>h5: 다섯 번쨰 레벨 제목(본문보다 조금 강조된 정도)</h5>

    <!--여섯 번쨰 레벨 제목: 가장 작은 제목-->
    <h6>h6:여섯 번째 레벨 제목(가장 작은 크기)</h6>
</body>
</html>
