<!DOCTYPE html>
<html 1ang="ko">
<head>
    <meta charset="utf-8">
    <title>예제 3-4 문자 태그</title>
    </head>
    <body>
        <!--흘림체(기울임)italic-->
        <p><i>italic</i></p>
        <!--굵은 강조체-->
    <p><b>강조체 bold</b></p>
    <!--밑줄-->
    <p><u>밑줄 문자 underline</u></p>
    <!--논리적 강조: 화면뿐 아니라 의미적으로도 중요도를 표시-->
    <p><strong>strong 강조체</strong>strong></p>
    <!--의미적 강조: 문맥상 강조할 부분을 기울임처리-->
    <p><em>흘림체 emphasized</em></p>
    <!--코드 조각 표시: 고정 폭 글꼴로 출력-->
    <p><code>프로그램 코드 code</code></p>
    <!--위 첨자: 글자를 위로 살짝 올림-->
    <p>100<sup>superscript</sup></p>
    <!--아래 첨자: 글자를 아래로 살짝 내림-->
    <p>Log<sub>10</sub> superscript</p>
</body>
</html>
